name: Build IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build IPA
        run: |
          xcodebuild archive \
            -project TestApp.xcodeproj \
            -scheme TestApp \
            -archivePath ./TestApp.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p Payload
          cp -R ./TestApp.xcarchive/Products/Applications/TestApp.app ./Payload/
          zip -r TestApp.ipa ./Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TestApp-IPA
          path: TestApp.ipa
